[profile.default]
src = "src"
out = "out"
libs = ["lib"]
fs_permissions = [{access='read',path='.'}]
allow_internal_expect_revert = true
# Whether or not to enable the Solidity optimizer
optimizer = true

# The number of runs to optimize for (default is 200)
optimizer_runs = 200

# Optional: Enable the IR-based code generator (via-IR) 
# Useful for complex contracts to avoid "Stack too deep" errors
via_ir = true


# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
