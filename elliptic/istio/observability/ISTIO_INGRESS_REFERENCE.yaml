    port: 15021
    protocol: TCP
    targetPort: 15021
  - name: http2
    nodePort: 31685
    port: 80
    protocol: TCP
    targetPort: 80
  - name: https
    nodePort: 31190
    port: 443
    protocol: TCP
    targetPort: 443
  selector:
    app: istio-ingress
    istio: ingress
  sessionAffinity: None
  type: LoadBalancer
status:
  loadBalancer:
    ingress:
    - ip: 10.100.30.107
      ipMode: VIP