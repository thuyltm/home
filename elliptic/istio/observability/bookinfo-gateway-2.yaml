apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: bookinfo-gateway-2
  namespace: istio-system
spec:
  # The selector matches the ingress gateway pod labels.
  # If you installed Istio using Helm following the standard documentation, this would be "istio=ingress"
  selector:
    istio: ingressgateway # use istio default controller
  servers:
  - port:
      number: 8080
      name: http
      protocol: HTTP
    hosts:
    - "book.bookinfo.com"
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: bookinfo-2
  namespace: book
spec:
  hosts:
  - "book.bookinfo.com"
  gateways:
  - istio-system/bookinfo-gateway-2
  http:
  - match:
    - uri:
        exact: /productpage
    - uri:
        prefix: /static
    - uri:
        exact: /login
    - uri:
        exact: /logout
    - uri:
        prefix: /api/v1/products
    route:
    - destination:
        host: productpage.book.svc.cluster.local
        port:
          number: 9080
