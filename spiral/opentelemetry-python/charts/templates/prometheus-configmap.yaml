apiVersion: v1
data:
  prometheus-config.yaml: |-
    global:
      evaluation_interval: 30s
      scrape_interval: 5s
    scrape_configs:
    - job_name: otel-collector
      static_configs:
      - targets:
        - 'otelcol:8888'
kind: ConfigMap
metadata:
  annotations:
    meta.helm.sh/release-name: flask-test
  labels:
    app.kubernetes.io/managed-by: Helm 
  name: prometheus-configmap
