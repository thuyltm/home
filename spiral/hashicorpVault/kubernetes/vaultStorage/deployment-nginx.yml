---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-deployment
  namespace: default
  labels:
    app: web-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-server
  template:
    metadata:
      labels:
        app: web-server
    spec:
      serviceAccountName: vault
      containers:
      - name: nginx-container
        image: nginx
        volumeMounts:
        - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
          name: k8s-audience-token
      volumes:
      - name: k8s-audience-token
        projected:
          sources:
          - serviceAccountToken:
              audience: "https://kubernetes.default.svc.cluster.local"
              expirationSeconds: 3600
              path: vault-token 
