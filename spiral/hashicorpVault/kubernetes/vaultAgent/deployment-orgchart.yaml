---
apiVersion: apps/v1
kind: Deployment
metadata:
   name: orgchart
   labels:
      app: orgchart
spec:
   selector:
      matchLabels:
         app: orgchart
   replicas: 1
   template:
      metadata:
         annotations:            
         labels:
            app: orgchart
      spec:
         serviceAccountName: internal-app
         containers:
            - name: orgchart
              image: jweissig/app:0.0.1
              volumeMounts:
               - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
                 name: token
         volumes:
         - name: token
           projected:
             sources:
               - serviceAccountToken:
                  audience: "https://kubernetes.default.svc.cluster.local"
                  expirationSeconds: 3600
                  path: token 

