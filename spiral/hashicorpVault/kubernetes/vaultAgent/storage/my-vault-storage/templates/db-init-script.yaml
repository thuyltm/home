apiVersion: v1
data:
  init.sql: |
        CREATE TABLE IF NOT EXISTS vault_kv_store (
            parent_path TEXT COLLATE "C" NOT NULL,
            path TEXT COLLATE "C",
            key TEXT COLLATE "C",
            value BYTEA,
            CONSTRAINT pkey PRIMARY KEY (path, key)
        );

        CREATE INDEX IF NOT EXISTS parent_path_idx ON vault_kv_store (parent_path);

        CREATE TABLE IF NOT EXISTS vault_ha_locks (
            ha_key TEXT COLLATE "C" NOT NULL,
            ha_identity TEXT COLLATE "C" NOT NULL,
            ha_value TEXT COLLATE "C",
            valid_until TIMESTAMP WITH TIME ZONE NOT NULL,
            CONSTRAINT ha_key PRIMARY KEY (ha_key)
        );

        DROP FUNCTION IF EXISTS vault_kv_put(TEXT, TEXT, TEXT, BYTEA);

        CREATE FUNCTION vault_kv_put(_parent_path TEXT, _path TEXT, _key TEXT, _value BYTEA) RETURNS VOID AS 
        $$
        BEGIN
            LOOP
                -- first try to update the key
                UPDATE vault_kv_store 
                    SET (parent_path, path, key, value) = (_parent_path, _path, _key, _value)
                    WHERE path = _path AND key = _key;
                IF found THEN
                    RETURN;
                END IF;
                -- not there, so try to insert the key
                -- if someone else inserts the same key concurrently, 
                -- we could get a unique-key failure
                BEGIN
                    INSERT INTO vault_kv_store (parent_path, path, key, value) VALUES (_parent_path, _path, _key, _value);
                    RETURN;
                EXCEPTION WHEN unique_violation THEN
                    -- do nothing, and loop to try the UPDATE 
                END;
            END LOOP;
        END;
        $$ 
        LANGUAGE plpgsql;
      
kind: ConfigMap
metadata:
  name: db-init-script
  namespace: default